# .pre-commit-config.yaml
repos:
  - repo: local
    hooks:
      - id: update-version
        name: Update plugin version in adsb.py
        entry: python update_version.py
        language: system
        files: '^(pyproject\.toml|plugin/adsb\.py|update_version\.py)$'
        pass_filenames: false
        always_run: true
